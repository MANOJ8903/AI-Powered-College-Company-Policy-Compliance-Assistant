# Test profile server port
server.port=8081

# Database Configuration (H2 memory database)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.flyway.enabled=false

# Mock APIs for testing
chromadb.api.url=http://localhost:8000
groq.api.key=mock-groq-key
groq.model=llama-3.3-70b-versatile

# Mock JWT Configuration
security.jwt.secret=mock_jwt_secret_signing_key_must_be_long_and_secure_here_with_at_least_256_bits_for_validation
security.jwt.expiration-ms=3600000
