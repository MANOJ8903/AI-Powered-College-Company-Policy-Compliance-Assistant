# Database Configuration (H2 Memory Database for local offline development)
spring.datasource.url=jdbc:h2:mem:policy_guardian_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Disable Flyway for H2 (Hibernate will auto-generate the mock schema)
spring.flyway.enabled=false
