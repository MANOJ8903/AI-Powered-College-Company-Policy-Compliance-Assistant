# Server configuration
server.port=${PORT:8080}

# Database Configuration (MySQL)
spring.datasource.url=${DB_URL:jdbc:h2:mem:policy_guardian_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER_CLASS_NAME:org.h2.Driver}

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:create-drop}
spring.jpa.show-sql=false
spring.flyway.enabled=${FLYWAY_ENABLED:false}

# File Upload configurations (limiting file size to 15MB)
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

# ChromaDB Configuration
chromadb.api.url=http://${CHROMA_HOST:localhost}:8000

# Groq API Configuration
groq.api.key=${GROQ_API_KEY:gsk_placeholder_key}
groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}

# JWT Configuration
security.jwt.secret=${JWT_SECRET:your_jwt_secret_signing_key_must_be_long_and_secure_here_with_at_least_256_bits_for_validation}
# Expiration: 1 day (86400000 ms)
security.jwt.expiration-ms=86400000

# Text chunking configurations
policy.chunk.size=500
policy.chunk.overlap=50