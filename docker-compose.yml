version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: policy_guardian_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_DATABASE:-policy_guardian}
      MYSQL_USER: ${DB_USER:-guardian_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-guardian_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - policy_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u$$DB_USER", "-p$$DB_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    container_name: policy_guardian_chroma
    restart: always
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/data
      - ANONYMIZED_TELEMETRY=FALSE
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/data
    networks:
      - policy_network
    healthcheck:
      # Checks database heartbeat endpoint using standard Python urllib.request
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/heartbeat')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: policy_guardian_backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-policy_guardian}
      - DB_USER=${DB_USER:-guardian_user}
      - DB_PASSWORD=${DB_PASSWORD:-guardian_pass}
      - CHROMA_HOST=chromadb
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      mysql:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    networks:
      - policy_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: policy_guardian_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - policy_network

volumes:
  mysql_data:
  chroma_data:

networks:
  policy_network:
    driver: bridge
